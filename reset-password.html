<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
body { min-height: 100vh; display: flex; justify-content: center; align-items: center; background: #061323; color: white; }
.container { width: min(430px, calc(100vw - 32px)); padding: 40px; border-radius: 28px; background: rgba(255,255,255,0.12); backdrop-filter: blur(18px); box-shadow: 0 30px 80px rgba(0,0,0,0.35); text-align: center; }
.container h1 { font-size: 32px; margin-bottom: 8px; font-weight: 800; }
.container p { font-size: 18px; margin-bottom: 26px; opacity: 0.92; }
.input-group { margin-bottom: 18px; text-align: left; }
.input-group label { font-size: 16px; font-weight: 500; }
.input-group input { width: 100%; padding: 12px 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.12); margin-top: 8px; outline: none; font-size: 16px; background: rgba(255,255,255,0.08); color: white; }
button { width: 100%; padding: 14px; border-radius: 16px; border: none; background: linear-gradient(45deg, #f59e0b, #10b981); color: white; font-size: 18px; font-weight: 700; cursor: pointer; transition: transform 0.25s ease, box-shadow 0.25s ease; }
button:hover { transform: translateY(-2px); box-shadow: 0 14px 26px rgba(16, 185, 129, 0.2); }
.message { margin-top: 18px; font-size: 15px; color: #d1d5db; }
.secondary-link { margin-top: 16px; font-size: 16px; }
.secondary-link a { color: #f8fafc; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<div class="container">
    <h1>Reset Password</h1>
    <p>Choose a new password for your account.</p>
    <form id="reset-form">
        <div class="input-group">
            <label>New Password</label>
            <input id="reset-password" type="password" placeholder="Enter new password" required>
        </div>
        <div class="input-group">
            <label>Confirm Password</label>
            <input id="reset-confirm-password" type="password" placeholder="Confirm new password" required>
        </div>
        <button type="submit">Reset Password</button>
    </form>
    <div id="message" class="message"></div>
    <div class="secondary-link"><a href="login.html">Back to login</a></div>
</div>
<script>
const API_BASE = window.location.protocol.startsWith('http') ? (window.location.port === '3000' ? window.location.origin : `${window.location.protocol}//${window.location.hostname}:3000`) : 'http://localhost:3000';

function getQueryParam(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
}

async function apiRequest(endpoint, options = {}) {
    const config = { headers: { 'Content-Type': 'application/json' }, ...options };
    const response = await fetch(`${API_BASE}${endpoint}`, config);
    const text = await response.text();
    const data = text ? JSON.parse(text) : null;
    if (!response.ok) throw new Error(data?.error || `Request failed (${response.status})`);
    return data;
}

const token = getQueryParam('token');
const messageEl = document.getElementById('message');
if (!token) {
    messageEl.textContent = 'Reset token is missing or invalid. Please request a new link.';
    document.getElementById('reset-form').style.display = 'none';
}

document.getElementById('reset-form').addEventListener('submit', async event => {
    event.preventDefault();
    messageEl.textContent = '';
    const password = document.getElementById('reset-password').value;
    const confirm = document.getElementById('reset-confirm-password').value;
    if (password.length < 6) {
        messageEl.textContent = 'Password must be at least 6 characters.';
        return;
    }
    if (password !== confirm) {
        messageEl.textContent = 'Passwords do not match.';
        return;
    }
    try {
        await apiRequest('/api/password-reset', {
            method: 'POST',
            body: JSON.stringify({ token, password })
        });
        messageEl.textContent = 'Password changed successfully. You can now log in.';
        document.getElementById('reset-form').reset();
    } catch (error) {
        messageEl.textContent = error.message;
    }
});
</script>
</body>
</html>
