<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Connect - Sign Up</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    position: relative;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #061323;
    color: white;
}

.wallpaper {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 10% 20%, rgba(16, 185, 129, 0.2), transparent 18%),
                radial-gradient(circle at 85% 20%, rgba(59, 130, 246, 0.16), transparent 20%),
                radial-gradient(circle at 60% 75%, rgba(251, 191, 36, 0.18), transparent 24%),
                linear-gradient(135deg, #071620 0%, #103054 40%, #0f3e57 100%);
    z-index: -2;
}

.wallpaper::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 35% 40%, rgba(255,255,255,0.08), transparent 30%);
    filter: blur(72px);
}

.wallpaper::after {
    content: '';
    position: absolute;
    right: 10%;
    bottom: 5%;
    width: 340px;
    height: 340px;
    background: rgba(245, 158, 11, 0.16);
    border-radius: 50%;
    filter: blur(76px);
    animation: floatGlow 14s ease-in-out infinite;
}

@keyframes floatGlow {
    0%,100% { transform: translate(0, 0); }
    50% { transform: translate(-32px, 26px); }
}

.container {
    width: min(470px, calc(100vw - 30px));
    padding: 40px;
    border-radius: 28px;
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(18px);
    box-shadow: 0 30px 80px rgba(0,0,0,0.35);
    color: white;
    text-align: center;
    position: relative;
    z-index: 1;
}

.icon {
    font-size: 45px;
    margin-bottom: 10px;
}

h1 {
    font-size: 32px;
    margin-bottom: 4px;
    font-weight: 800;
}

p {
    font-size: 18px;
    margin-bottom: 24px;
    opacity: 0.92;
}

.input-group {
    margin-bottom: 18px;
    text-align: left;
}

.input-group label {
    font-size: 15px;
    font-weight: 500;
}

.input-group input {
    width: 100%;
    padding: 13px 14px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.12);
    margin-top: 8px;
    outline: none;
    font-size: 15px;
    background: rgba(255,255,255,0.08);
    color: white;
}

.role-selection {
    margin: 20px 0;
    text-align: left;
}

.role-selection label {
    display: block;
    margin: 8px 0;
    cursor: pointer;
    font-size: 16px;
}

.role-selection input {
    margin-right: 10px;
}

button {
    width: 100%;
    padding: 14px;
    border-radius: 16px;
    border: none;
    background: linear-gradient(45deg, #10b981, #4f46e5);
    color: white;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 26px rgba(79, 70, 229, 0.2);
}

.footer-links {
    margin-top: 20px;
    font-size: 16px;
}

.footer-links a {
    color: #f8fafc;
    text-decoration: none;
    font-weight: 600;
}

.footer-links a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>
<div class="wallpaper"></div>
<div class="container">
    <div class="icon">🌍</div>
    <h1>Create Account</h1>
    <p>Join Community Connect Today</p>

    <form id="signup-form">
        <div class="input-group">
            <label>Full Name / Organization Name</label>
            <input id="signup-name" type="text" placeholder="Enter your name" required>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input id="signup-email" type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input id="signup-password" type="password" placeholder="Create a password" required>
        </div>

        <div class="input-group">
            <label>Confirm Password</label>
            <input id="signup-confirm" type="password" placeholder="Confirm your password" required>
        </div>

        <div class="role-selection">
            <label><input type="radio" name="role" value="Volunteer" required checked> Volunteer</label>
            <label><input type="radio" name="role" value="Organization"> Organization</label>
            <label><input type="radio" name="role" value="Need Help"> Need Help</label>
        </div>

        <button type="submit">Sign Up</button>
    </form>

    <script src="app.js"></script>
    <script>
    document.getElementById('signup-form').addEventListener('submit', async function(e){
        e.preventDefault();
        const name = document.getElementById('signup-name').value.trim();
        const email = document.getElementById('signup-email').value.trim().toLowerCase();
        const pw = document.getElementById('signup-password').value;
        const conf = document.getElementById('signup-confirm').value;
        const roleEl = document.querySelector('input[name="role"]:checked');
        const role = roleEl ? roleEl.value : 'user';

        if(!name || !email || !pw){
            alert('Please fill all fields');
            return;
        }
        if(pw !== conf){
            alert('Passwords do not match');
            return;
        }

        try {
            await registerUser({ name, email, password: pw, role });
        } catch (error) {
            alert('Registration failed: ' + error.message);
        }
    });
    </script>

    <div class="footer-links">
        <p>Already have an account? <a href="login.html">Login</a></p>
    </div>
</div>

</body>
</html>
