<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
body { min-height: 100vh; display: flex; justify-content: center; align-items: center; background: #061323; color: white; }
.container { width: min(430px, calc(100vw - 32px)); padding: 40px; border-radius: 28px; background: rgba(255,255,255,0.12); backdrop-filter: blur(18px); box-shadow: 0 30px 80px rgba(0,0,0,0.35); text-align: center; }
.container h1 { font-size: 32px; margin-bottom: 8px; font-weight: 800; }
.container p { font-size: 18px; margin-bottom: 26px; opacity: 0.92; }
.input-group { margin-bottom: 18px; text-align: left; }
.input-group label { font-size: 16px; font-weight: 500; }
.input-group input { width: 100%; padding: 12px 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.12); margin-top: 8px; outline: none; font-size: 16px; background: rgba(255,255,255,0.08); color: white; }
button { width: 100%; padding: 14px; border-radius: 16px; border: none; background: linear-gradient(45deg, #f59e0b, #10b981); color: white; font-size: 18px; font-weight: 700; cursor: pointer; transition: transform 0.25s ease, box-shadow 0.25s ease; }
button:hover { transform: translateY(-2px); box-shadow: 0 14px 26px rgba(16, 185, 129, 0.2); }
.message { margin-top: 18px; font-size: 15px; color: #d1d5db; }
.message a { color: #93c5fd; text-decoration: underline; }
.secondary-link { margin-top: 16px; font-size: 16px; }
.secondary-link a { color: #f8fafc; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<div class="container">
    <h1>Forgot Password</h1>
    <p>Enter your email to receive a reset link.</p>
    <form id="forgot-form">
        <div class="input-group">
            <label>Email</label>
            <input id="forgot-email" type="email" placeholder="Enter your email" required>
        </div>
        <button type="submit">Send Reset Link</button>
    </form>
    <div id="message" class="message"></div>
    <div class="secondary-link"><a href="login.html">Back to login</a></div>
</div>
<script>
const API_BASE = window.location.protocol.startsWith('http') ? (window.location.port === '3000' ? window.location.origin : `${window.location.protocol}//${window.location.hostname}:3000`) : 'http://localhost:3000';

function validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

async function apiRequest(endpoint, options = {}) {
    const config = { headers: { 'Content-Type': 'application/json' }, ...options };
    const response = await fetch(`${API_BASE}${endpoint}`, config);
    const text = await response.text();
    const data = text ? JSON.parse(text) : null;
    if (!response.ok) throw new Error(data?.error || `Request failed (${response.status})`);
    return data;
}

const form = document.getElementById('forgot-form');
const messageEl = document.getElementById('message');
form.addEventListener('submit', async event => {
    event.preventDefault();
    messageEl.textContent = '';
    const email = document.getElementById('forgot-email').value.trim().toLowerCase();
    if (!validateEmail(email)) {
        messageEl.textContent = 'Please enter a valid email address.';
        return;
    }
    try {
        const result = await apiRequest('/api/password-reset-request', {
            method: 'POST',
            body: JSON.stringify({ email })
        });
        messageEl.innerHTML = 'Reset link generated. <br><a href="' + result.resetLink + '">Open reset page</a>';
    } catch (error) {
        messageEl.textContent = error.message;
    }
});
</script>
</body>
</html>
