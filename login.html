<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Connect - Login</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    position: relative;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #061323;
    color: white;
}

.wallpaper {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 15% 20%, rgba(96, 165, 250, 0.25), transparent 18%),
                radial-gradient(circle at 80% 15%, rgba(34, 197, 94, 0.22), transparent 20%),
                radial-gradient(circle at 55% 70%, rgba(251, 191, 36, 0.18), transparent 25%),
                linear-gradient(135deg, #071620 0%, #103054 40%, #0f3e57 100%);
    z-index: -2;
    overflow: hidden;
}

.wallpaper::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.08), transparent 35%);
    filter: blur(80px);
}

.wallpaper::after {
    content: '';
    position: absolute;
    left: 20%;
    top: 10%;
    width: 360px;
    height: 360px;
    background: rgba(59, 130, 246, 0.16);
    border-radius: 50%;
    filter: blur(90px);
    animation: floatBlue 12s ease-in-out infinite;
}

@keyframes floatBlue {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(26px, -34px); }
}

@keyframes glowMove {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(22px); }
}

.container {
    width: min(430px, calc(100vw - 32px));
    padding: 40px;
    border-radius: 28px;
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(18px);
    box-shadow: 0 30px 80px rgba(0,0,0,0.35);
    color: white;
    text-align: center;
    position: relative;
    z-index: 1;
}

.container h1 {
    font-size: 32px;
    margin-bottom: 8px;
    font-weight: 800;
}

.container p {
    font-size: 18px;
    margin-bottom: 26px;
    opacity: 0.92;
}

.input-group {
    margin-bottom: 18px;
    text-align: left;
}

.input-group label {
    font-size: 16px;
    font-weight: 500;
}

.input-group input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.12);
    margin-top: 8px;
    outline: none;
    font-size: 16px;
    background: rgba(255,255,255,0.08);
    color: white;
}

button {
    width: 100%;
    padding: 14px;
    border-radius: 16px;
    border: none;
    background: linear-gradient(45deg, #f59e0b, #10b981);
    color: white;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 26px rgba(16, 185, 129, 0.2);
}

.text-button {
    background: transparent;
    border: none;
    color: #93c5fd;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
}

.forgot-password {
    margin-bottom: 18px;
    text-align: right;
}

.footer-links {
    margin-top: 20px;
    font-size: 16px;
}

.footer-links a {
    color: #f8fafc;
    text-decoration: none;
    font-weight: 600;
}

.footer-links a:hover {
    text-decoration: underline;
}

.icon {
    font-size: 42px;
    margin-bottom: 14px;
}
</style>
</head>

<body>
<div class="wallpaper"></div>
<div class="container">
    <div class="icon">🤝</div>
    <h1>Community Connect</h1>
    <p>Connecting Hearts. Empowering Communities.</p>

    <form id="login-form">
        <div class="input-group">
            <label>Email</label>
            <input id="login-email" type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input id="login-password" type="password" placeholder="Enter your password" required>
        </div>

        <div class="forgot-password">
            <button type="button" id="forgot-password-btn" class="text-button">Forgot Password?</button>
        </div>

        <button type="submit">Login</button>
    </form>

    <script src="app.js"></script>
    <script>
    function validateEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    document.getElementById('login-form').addEventListener('submit', async function(e){
        e.preventDefault();
        const email = document.getElementById('login-email').value.trim().toLowerCase();
        const pw = document.getElementById('login-password').value;

        if (!validateEmail(email)) {
            alert('Please enter a valid email address.');
            return;
        }

        try {
            await loginUser({ email, password: pw });
        } catch (error) {
            alert('Login failed: ' + error.message);
        }
    });

    document.getElementById('forgot-password-btn').addEventListener('click', function() {
        window.location.href = 'forgot-password.html';
    });
    </script>

    <div class="footer-links">
        <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
    </div>
</div>

</body>
</html>
